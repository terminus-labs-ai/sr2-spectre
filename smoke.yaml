agent:
  name: spectre-smoke
  max_tool_rounds: 10
  tools:
    - name: terminal
      class_path: sr2_spectre.tools.builtins.terminal.TerminalTool
      config:
        timeout: 30
    - name: file_read
      class_path: sr2_spectre.tools.builtins.file_read.FileReadTool
      config:
        max_bytes: 1000000
    - name: file_write
      class_path: sr2_spectre.tools.builtins.file_write.FileWriteTool

models:
  default:
    model: openai/qwen3.6:27b
    base_url: http://localhost:11438/v1

pipeline:
  token_budget: 200000
  layers:
    - name: system
      resolvers:
        - type: static
          config:
            text: "You are a helpful AI assistant with access to tools. Use them when helpful."
    - name: tools
      resolvers: []
      tool_providers:
        - type: spectre_tools
    - name: conversation
      resolvers:
        - type: session
        - type: input
